name: Test

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    types: [ready_for_review]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: pnpm 🧰
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Node 🧰
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install 📦
        run: pnpm install

      - name: Run Check 💅
        run: pnpm check

      - name: Run TS check 🔎
        run: pnpm ts:check

      - name: Run Audit 🔬
        run: pnpm audit || exit 0

      - name: Run Unit Tests 🧪
        run: pnpm test
